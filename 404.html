<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Collectif Feydeau</title>
  <script type="text/javascript">
    // Redirection pour le routage SPA sur GitHub Pages
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <meta http-equiv="refresh" content="0;URL='/Collectif-Feydeau---app/'">
</head>
<body>
  <p>Redirection vers l'application Collectif Feydeau...</p>
</body>
</html>
