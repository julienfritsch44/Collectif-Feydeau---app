<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Collectif Feydeau</title>
  <script type="text/javascript">
    // Redirection pour le routage SPA sur GitHub Pages
    // Cette fonction prend l'URL actuelle et la transforme en une URL que l'application peut comprendre
    var pathSegmentsToKeep = 1; // Nombre de segments de chemin à conserver dans l'URL

    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <p>Redirection vers l'application Collectif Feydeau...</p>
</body>
</html>
